<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Physically Realistic Bokeh Showcase</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020203;
      color: #f4f0e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(44, 38, 48, 0.34), transparent 54%),
        linear-gradient(180deg, #050507, #010102 62%, #000);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: fixed;
      left: 24px;
      top: 24px;
      width: min(340px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      padding: 18px 18px 16px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: rgba(10, 11, 13, 0.62);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 680;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 16px;
      color: rgba(244, 240, 232, 0.66);
      font-size: 12px;
      line-height: 1.45;
    }

    .control {
      display: grid;
      grid-template-columns: 88px 1fr 48px;
      gap: 10px;
      align-items: center;
      min-height: 34px;
      color: rgba(244, 240, 232, 0.82);
      font-size: 12px;
    }

    .control + .control {
      margin-top: 8px;
    }

    .value {
      color: rgba(244, 240, 232, 0.58);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #f0d28a;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .shape-editor {
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: 10px;
      align-items: stretch;
      margin-top: 12px;
    }

    .shape-canvas {
      width: 128px;
      height: 128px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      background: #000;
      cursor: zoom-in;
      touch-action: none;
    }

    .shape-crop {
      display: none;
      width: 128px;
      height: 128px;
      border: 1px solid rgba(240, 210, 138, 0.36);
      border-radius: 6px;
      background: #000;
      cursor: move;
      touch-action: none;
    }

    .shape-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-content: start;
    }

    .shape-actions button {
      width: 100%;
      flex: none;
      padding: 0 8px;
    }

    .shape-workspace {
      --shape-workspace-size: min(720px, calc(100vw - 308px), calc(100vh - 64px));
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 28px;
      background: rgba(0, 0, 0, 0.72);
      z-index: 10;
    }

    .shape-workspace.is-open {
      display: grid;
    }

    .shape-workspace-inner {
      display: grid;
      grid-template-columns: var(--shape-workspace-size) 220px;
      gap: 16px;
      align-items: start;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(9, 10, 12, 0.94);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    }

    .shape-canvas-large {
      width: var(--shape-workspace-size);
      height: var(--shape-workspace-size);
      border: 1px solid rgba(240, 210, 138, 0.36);
      border-radius: 6px;
      background: #000;
      cursor: crosshair;
      touch-action: none;
    }

    .shape-workspace-tools {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .shape-workspace-tools .control {
      grid-template-columns: 74px 1fr 40px;
      min-height: 30px;
    }

    .shape-workspace-tools input[type="color"] {
      width: 100%;
      height: 34px;
      padding: 2px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
    }

    .shape-workspace-tool-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .shape-workspace-section-title {
      margin-top: 4px;
      color: rgba(244, 240, 232, 0.58);
      font-size: 11px;
      font-weight: 680;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .texture-controls {
      display: grid;
      gap: 8px;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .texture-controls[hidden] {
      display: none;
    }

    .shape-import {
      display: none;
    }

    button {
      flex: 1 1 auto;
      height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #f4f0e8;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.13);
    }

    button.is-active {
      border-color: rgba(240, 210, 138, 0.6);
      background: rgba(240, 210, 138, 0.16);
    }

    .readout {
      position: fixed;
      right: 24px;
      bottom: 22px;
      color: rgba(244, 240, 232, 0.5);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: right;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.8);
    }

    @media (max-width: 720px) {
      .panel {
        left: 12px;
        right: 12px;
        top: 12px;
        width: auto;
        padding: 14px;
      }

      .control {
        grid-template-columns: 74px 1fr 42px;
      }

      .readout {
        right: 14px;
        bottom: 14px;
      }

      .shape-workspace {
        --shape-workspace-size: min(620px, calc(100vw - 40px), calc(100vh - 300px));
        padding: 12px;
      }

      .shape-workspace-inner {
        grid-template-columns: 1fr;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-label="Realistic bokeh rendering"></canvas>

  <section class="panel" aria-label="Lens controls">
    <h1>Realistic Bokeh</h1>
    <p class="subtitle">Thin-lens scale, aperture SDF, direct X/Y bokeh scaling, optical dispersion, and filmic exposure.</p>

    <label class="control">
      <span>f-stop</span>
      <input data-param="fStop" type="range" min="1" max="8" step="0.05" value="1.7">
      <span class="value" data-value="fStop"></span>
    </label>

    <label class="control">
      <span>Focus</span>
      <input data-param="focus" type="range" min="0.2" max="1" step="0.01" value="0.52">
      <span class="value" data-value="focus"></span>
    </label>

    <label class="control">
      <span>Blades</span>
      <input data-param="blades" type="range" min="3" max="12" step="1" value="9">
      <span class="value" data-value="blades"></span>
    </label>

    <label class="control">
      <span>Roundness</span>
      <input data-param="roundness" type="range" min="0" max="1" step="0.01" value="0.82">
      <span class="value" data-value="roundness"></span>
    </label>

    <label class="control">
      <span>X Scale</span>
      <input data-param="scaleX" type="range" min="0.35" max="2" step="0.01" value="1">
      <span class="value" data-value="scaleX"></span>
    </label>

    <label class="control">
      <span>Y Scale</span>
      <input data-param="scaleY" type="range" min="0.35" max="2" step="0.01" value="1">
      <span class="value" data-value="scaleY"></span>
    </label>

    <label class="control">
      <span>Randomness</span>
      <input data-param="randomness" type="range" min="0" max="1" step="0.01" value="0.28">
      <span class="value" data-value="randomness"></span>
    </label>

    <label class="control">
      <span>Count</span>
      <input data-param="bokehCount" type="range" min="8" max="103" step="1" value="56">
      <span class="value" data-value="bokehCount"></span>
    </label>

    <label class="control">
      <span>Size Random</span>
      <input data-param="sizeRandomness" type="range" min="0" max="1" step="0.01" value="0.38">
      <span class="value" data-value="sizeRandomness"></span>
    </label>

    <label class="control">
      <span>Overall Size</span>
      <input data-param="overallSize" type="range" min="0.45" max="2.2" step="0.01" value="1">
      <span class="value" data-value="overallSize"></span>
    </label>

    <label class="control">
      <span>Dispersion</span>
      <input data-param="chromatic" type="range" min="0" max="1" step="0.01" value="0.18">
      <span class="value" data-value="chromatic"></span>
    </label>

    <label class="control">
      <span>Rim bias</span>
      <input data-param="rimBias" type="range" min="-1" max="1" step="0.01" value="0.04">
      <span class="value" data-value="rimBias"></span>
    </label>

    <label class="control">
      <span>Exposure</span>
      <input data-param="exposure" type="range" min="0.25" max="1.8" step="0.01" value="1.05">
      <span class="value" data-value="exposure"></span>
    </label>

    <label class="control">
      <span>Bloom</span>
      <input data-param="bloom" type="range" min="0" max="1" step="0.01" value="0.04">
      <span class="value" data-value="bloom"></span>
    </label>

    <label class="control">
      <span>Base Hue</span>
      <input data-param="baseHue" type="range" min="0" max="360" step="1" value="36">
      <span class="value" data-value="baseHue"></span>
    </label>

    <label class="control">
      <span>Color Rand</span>
      <input data-param="colorRandomness" type="range" min="0" max="1" step="0.01" value="0.18">
      <span class="value" data-value="colorRandomness"></span>
    </label>

    <label class="control">
      <span>Alpha Rand</span>
      <input data-param="opacityRandomness" type="range" min="0" max="1" step="0.01" value="0.16">
      <span class="value" data-value="opacityRandomness"></span>
    </label>

    <label class="control">
      <span>Anim Move</span>
      <input data-param="motionAmount" type="range" min="0" max="1" step="0.01" value="0.72">
      <span class="value" data-value="motionAmount"></span>
    </label>

    <label class="control">
      <span>Anim Speed</span>
      <input data-param="motionSpeed" type="range" min="0.25" max="4" step="0.05" value="1.8">
      <span class="value" data-value="motionSpeed"></span>
    </label>

    <label class="control">
      <span>Anim Flicker</span>
      <input data-param="flickerAmount" type="range" min="0" max="1" step="0.01" value="0.55">
      <span class="value" data-value="flickerAmount"></span>
    </label>

    <div class="shape-editor" aria-label="Custom bokeh shape">
      <canvas id="shape-editor" class="shape-canvas" width="256" height="256"></canvas>
      <canvas id="shape-crop" class="shape-crop" width="256" height="256"></canvas>
      <div class="shape-actions">
        <button type="button" data-shape-preset="default">Default</button>
        <button type="button" data-shape-preset="circle">Circle</button>
        <button type="button" data-shape-preset="ellipse">Ellipse</button>
        <button type="button" data-shape-preset="rectangle">Rect</button>
        <button type="button" data-shape-preset="hexagon">Hex</button>
        <button type="button" data-shape-preset="star">Star</button>
        <button type="button" data-shape-preset="anamorphic">Slit</button>
        <button type="button" data-shape-preset="ring">Ring</button>
        <button type="button" id="shape-import-trigger">Import</button>
        <button type="button" id="shape-apply-crop">Apply</button>
        <button type="button" id="shape-edit-large">Edit</button>
        <button type="button" id="shape-clear">Clear</button>
      </div>
      <input id="shape-import" class="shape-import" type="file" accept="image/*">
    </div>
    <label class="control">
      <span>Shape Rot</span>
      <input data-param="shapeRotation" type="range" min="-180" max="180" step="1" value="0">
      <span class="value" data-value="shapeRotation"></span>
    </label>

    <label class="control">
      <span>Shape Scale</span>
      <input data-param="shapeScale" type="range" min="0.35" max="1.4" step="0.01" value="1">
      <span class="value" data-value="shapeScale"></span>
    </label>

    <div class="actions">
      <button id="preset-cinema" type="button">Cinema</button>
      <button id="preset-soap" type="button">Soap bubble</button>
      <button id="preset-night" type="button">Night street</button>
      <button id="shuffle-layout" type="button">Shuffle</button>
      <button id="export-frame" type="button">Frame</button>
      <button id="export-video" type="button">Video</button>
    </div>
  </section>

  <div class="shape-workspace" id="shape-workspace" aria-label="Large bokeh drawing workspace">
    <div class="shape-workspace-inner">
      <canvas id="shape-editor-large" class="shape-canvas-large" width="256" height="256"></canvas>
      <div class="shape-workspace-tools">
        <button type="button" id="shape-close-large">Close</button>
        <input id="shape-draw-color" type="color" value="#ffffff" aria-label="Brush color">
        <div class="shape-workspace-section-title">Brush</div>
        <div class="shape-workspace-tool-row">
          <button type="button" data-draw-tool="paint">Paint</button>
          <button type="button" data-draw-tool="black">Black</button>
          <button type="button" data-draw-tool="erase">Erase</button>
        </div>
        <label class="control">
          <span>Size</span>
          <input data-param="brushSize" type="range" min="4" max="72" step="1" value="24">
          <span class="value" data-value="brushSize"></span>
        </label>
        <label class="control">
          <span>Soft</span>
          <input data-param="brushSoftness" type="range" min="0" max="1" step="0.01" value="0.55">
          <span class="value" data-value="brushSoftness"></span>
        </label>
        <label class="control">
          <span>Opacity</span>
          <input data-param="brushOpacity" type="range" min="0.02" max="1" step="0.01" value="1">
          <span class="value" data-value="brushOpacity"></span>
        </label>
        <div class="texture-controls" id="texture-controls" hidden>
          <div class="shape-workspace-section-title">Imported Texture</div>
          <label class="control">
            <span>Black</span>
            <input data-param="textureBlack" type="range" min="0" max="0.85" step="0.01" value="0">
            <span class="value" data-value="textureBlack"></span>
          </label>
          <label class="control">
            <span>White</span>
            <input data-param="textureWhite" type="range" min="0.15" max="1" step="0.01" value="1">
            <span class="value" data-value="textureWhite"></span>
          </label>
          <label class="control">
            <span>Gamma</span>
            <input data-param="textureGamma" type="range" min="0.25" max="3" step="0.01" value="1">
            <span class="value" data-value="textureGamma"></span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="readout" id="readout"></div>

  <script>
    const canvas = document.querySelector("#scene");
    let ctx = null;
    let mainCtx = null;
    const readout = document.querySelector("#readout");
    const bokehLayer = document.createElement("canvas");
    const bokehCtx = bokehLayer.getContext("2d", { alpha: true });
    const bloomLayer = document.createElement("canvas");
    const bloomCtx = bloomLayer.getContext("2d", { alpha: true });
    const shapeEditor = document.querySelector("#shape-editor");
    const shapeCtx = shapeEditor.getContext("2d", { alpha: false });
    const largeShapeEditor = document.querySelector("#shape-editor-large");
    const largeShapeCtx = largeShapeEditor.getContext("2d", { alpha: false });
    const shapeWorkspace = document.querySelector("#shape-workspace");
    const shapeCrop = document.querySelector("#shape-crop");
    const shapeCropCtx = shapeCrop.getContext("2d", { alpha: false });
    const shapeImport = document.querySelector("#shape-import");
    const shapeDrawColor = document.querySelector("#shape-draw-color");
    const textureControls = document.querySelector("#texture-controls");
    const SHAPE_TEXTURE_SIZE = 256;
    const shapeBaseLayer = document.createElement("canvas");
    const shapePaintLayer = document.createElement("canvas");
    const rawImportedShapeTextureCanvas = document.createElement("canvas");
    const importedShapeTextureCanvas = document.createElement("canvas");
    shapeBaseLayer.width = shapeBaseLayer.height = SHAPE_TEXTURE_SIZE;
    shapePaintLayer.width = shapePaintLayer.height = SHAPE_TEXTURE_SIZE;
    rawImportedShapeTextureCanvas.width = rawImportedShapeTextureCanvas.height = SHAPE_TEXTURE_SIZE;
    importedShapeTextureCanvas.width = importedShapeTextureCanvas.height = SHAPE_TEXTURE_SIZE;
    const shapeBaseCtx = shapeBaseLayer.getContext("2d", { alpha: true });
    const shapePaintCtx = shapePaintLayer.getContext("2d", { alpha: true });
    const rawImportedShapeTextureCtx = rawImportedShapeTextureCanvas.getContext("2d", { alpha: true });
    const importedShapeTextureCtx = importedShapeTextureCanvas.getContext("2d", { alpha: true });
    const TARGET_FPS = 30;
    const FRAME_INTERVAL_MS = 1000 / TARGET_FPS;
    let lastFrameTime = 0;
    let shapeTextureVersion = 0;
    let isDrawingShape = false;
    let lastShapePoint = null;
    let currentShapePreset = "default";
    let currentDrawTool = "paint";
    let importedShapeImage = null;
    let isDraggingCrop = false;
    let cropDragStart = null;
    let cropBoxSize = SHAPE_TEXTURE_SIZE;
    let exportStatus = "";
    let exportStatusTimer = 0;
    const cropState = {
      centerX: SHAPE_TEXTURE_SIZE * 0.5,
      centerY: SHAPE_TEXTURE_SIZE * 0.5,
      scale: 1
    };

    const params = {
      fStop: 1.7,
      focus: 0.52,
      blades: 9,
      roundness: 0.82,
      scaleX: 1,
      scaleY: 1,
      randomness: 0.16,
      bokehCount: 56,
      sizeRandomness: 0.38,
      overallSize: 1,
      chromatic: 0.18,
      rimBias: 0.04,
      exposure: 1.05,
      bloom: 0.04,
      baseHue: 36,
      colorRandomness: 0.18,
      opacityRandomness: 0.16,
      motionAmount: 0.72,
      motionSpeed: 1.8,
      flickerAmount: 0.55,
      shapeRotation: 0,
      shapeScale: 1,
      brushSize: 24,
      brushSoftness: 0.55,
      brushOpacity: 1,
      textureBlack: 0,
      textureWhite: 1,
      textureGamma: 1
    };

    const formatters = {
      fStop: value => `f/${value.toFixed(1)}`,
      focus: value => value.toFixed(2),
      blades: value => String(Math.round(value)),
      roundness: value => `${Math.round(value * 100)}%`,
      scaleX: value => `${value.toFixed(2)}x`,
      scaleY: value => `${value.toFixed(2)}x`,
      randomness: value => `${Math.round(value * 100)}%`,
      bokehCount: value => String(Math.round(value)),
      sizeRandomness: value => `${Math.round(value * 100)}%`,
      overallSize: value => `${value.toFixed(2)}x`,
      chromatic: value => `${Math.round(value * 100)}%`,
      rimBias: value => value.toFixed(2),
      exposure: value => `${value.toFixed(2)}x`,
      bloom: value => `${Math.round(value * 100)}%`,
      baseHue: value => `${Math.round(value)}deg`,
      colorRandomness: value => `${Math.round(value * 100)}%`,
      opacityRandomness: value => `${Math.round(value * 100)}%`,
      motionAmount: value => `${Math.round(value * 100)}%`,
      motionSpeed: value => `${value.toFixed(2)}x`,
      flickerAmount: value => `${Math.round(value * 100)}%`,
      shapeRotation: value => `${Math.round(value)}deg`,
      shapeScale: value => `${value.toFixed(2)}x`,
      brushSize: value => `${Math.round(value)}px`,
      brushSoftness: value => `${Math.round(value * 100)}%`,
      brushOpacity: value => `${Math.round(value * 100)}%`,
      textureBlack: value => value.toFixed(2),
      textureWhite: value => value.toFixed(2),
      textureGamma: value => value.toFixed(2)
    };

    const warm = [244, 176, 95];
    const sodium = [236, 128, 62];
    const red = [205, 48, 38];
    const coolWhite = [220, 228, 226];
    const white = [246, 226, 188];

    function seededRandom(seed) {
      let state = seed >>> 0;
      return () => {
        state = (state * 1664525 + 1013904223) >>> 0;
        return state / 4294967296;
      };
    }

    function createTrafficLights(seed) {
      const rand = seededRandom(seed);
      const lights = [];

      function pick(list) {
        return list[Math.floor(rand() * list.length)];
      }

      function addLight(light) {
        lights.push({
          phase: rand() * Math.PI * 2,
          drift: 0.035 + rand() * 0.075,
          textureSeed: rand() * 1000,
          ...light
        });
      }

      function addPair(kind, centerX, y, spacing, depth, color, intensity, size) {
        const lean = (rand() - 0.5) * spacing * 0.22;
        addLight({ kind, x: centerX - spacing * 0.5, y: y - lean, depth, color, intensity: intensity * (0.9 + rand() * 0.16), size });
        addLight({ kind, x: centerX + spacing * 0.5, y: y + lean, depth: depth + (rand() - 0.5) * 0.025, color, intensity: intensity * (0.9 + rand() * 0.16), size: size * (0.92 + rand() * 0.13) });
      }

      for (let i = 0; i < 11; i++) {
        const t = i / 10;
        const y = 0.18 + t * 0.42 + (rand() - 0.5) * 0.018;
        const spread = 0.14 + t * 0.44;
        const depth = 0.18 + t * 0.55;
        const size = 0.22 + t * 0.38;
        const intensity = 0.34 + t * 0.46;
        const color = pick([sodium, sodium, sodium, warm]);
        addLight({ kind: "street", x: 0.5 - spread + (rand() - 0.5) * 0.018, y, depth, color, intensity, size });
        if (i > 1 && i < 10) {
          addLight({ kind: "street", x: 0.5 + spread + (rand() - 0.5) * 0.018, y: y + (rand() - 0.5) * 0.014, depth, color, intensity: intensity * 0.86, size: size * 0.94 });
        }
      }

      for (let i = 0; i < 14; i++) {
        const t = i / 13;
        const y = 0.34 + Math.pow(t, 1.18) * 0.42 + (rand() - 0.5) * 0.025;
        const lane = rand() < 0.56 ? -1 : 1;
        const centerX = 0.54 + lane * (0.035 + Math.pow(t, 1.35) * 0.18) + (rand() - 0.5) * (0.018 + t * 0.028);
        const spacing = 0.01 + t * 0.042;
        const depth = 0.28 + Math.pow(t, 1.25) * 0.68;
        const color = pick([white, white, white, warm, coolWhite]);
        addPair("headlight", centerX, y, spacing, depth, color, 0.72 + t * 0.82, 0.24 + t * 0.42);
      }

      for (let i = 0; i < 12; i++) {
        const t = i / 11;
        const y = 0.43 + Math.pow(t, 1.1) * 0.38 + (rand() - 0.5) * 0.026;
        const centerX = 0.49 + (rand() < 0.5 ? -1 : 1) * (0.03 + Math.pow(t, 1.2) * 0.15) + (rand() - 0.5) * 0.06;
        const spacing = 0.01 + t * 0.038;
        const depth = 0.34 + Math.pow(t, 1.15) * 0.62;
        addPair("tail", centerX, y, spacing, depth, red, 0.5 + t * 0.58, 0.2 + t * 0.36);
      }

      const foreground = [
        { kind: "headlight", x: 0.34, y: 0.68, depth: 1.1, color: white, intensity: 1.16, size: 0.72 },
        { kind: "headlight", x: 0.4, y: 0.7, depth: 1.06, color: warm, intensity: 1.02, size: 0.62 },
        { kind: "tail", x: 0.76, y: 0.69, depth: 1.0, color: red, intensity: 0.86, size: 0.6 },
        { kind: "street", x: 0.9, y: 0.43, depth: 0.7, color: sodium, intensity: 0.74, size: 0.54 }
      ];
      foreground.forEach(addLight);

      for (let i = 0; i < 28; i++) {
        const side = rand() < 0.5 ? -1 : 1;
        const horizonT = Math.pow(rand(), 1.8);
        const y = 0.2 + horizonT * 0.54;
        const roadSpread = 0.06 + horizonT * 0.46;
        const x = clamp(0.5 + side * roadSpread * (0.35 + rand() * 0.75) + (rand() - 0.5) * 0.045, 0.04, 0.96);
        const depth = 0.18 + horizonT * 0.78;
        const color = pick([warm, warm, warm, sodium, sodium, white, red, red, coolWhite]);
        addLight({
          kind: "ambient",
          x,
          y,
          depth,
          color,
          intensity: 0.16 + rand() * 0.3,
          size: 0.12 + Math.pow(rand(), 2.2) * 0.3
        });
      }

      return lights;
    }

    const lights = createTrafficLights(9461);

    lights.forEach((light, index) => {
      light.index = index;
      light.anchorX = light.x;
      light.anchorY = light.y;
      light.anchorDepth = light.depth;
    });

    let layoutSeed = 9461;
    let randomizedLayout = [];

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function activeLights() {
      const count = clamp(Math.round(params.bokehCount), 1, lights.length);
      if (count >= lights.length) return lights;
      const selected = [];
      const step = lights.length / count;
      for (let i = 0; i < count; i++) {
        selected.push(lights[Math.floor(i * step)]);
      }
      return selected;
    }

    function lightSizeNoise(light) {
      const raw = Math.sin((light.index + 1) * 127.13 + light.textureSeed * 0.017) * 43758.5453;
      return raw - Math.floor(raw);
    }

    function computeBokehRadius(light, minDim) {
      const maxSizeRatio = 2;
      const sizeRandomness = Math.max(0, Math.min(1, params.sizeRandomness));
      const apertureScale = 1.8 / params.fStop;
      const focusLift = 0.86 + Math.abs(params.focus - 0.52) * 0.36;
      const baseRadius = Math.max(3, minDim * (0.012 + apertureScale * 0.009) * focusLift);
      const sizeFactor = 1 + lightSizeNoise(light) * sizeRandomness * (maxSizeRatio - 1);
      const maxRadius = baseRadius * maxSizeRatio;
      const overallSize = Math.max(0.45, Math.min(2.2, params.overallSize));
      return Math.min(maxRadius, baseRadius * sizeFactor) * overallSize;
    }

    function markShapeChanged() {
      shapeTextureVersion += 1;
    }

    function setExportStatus(message) {
      exportStatus = message;
      if (exportStatusTimer) window.clearTimeout(exportStatusTimer);
      exportStatusTimer = window.setTimeout(() => {
        exportStatus = "";
      }, 4200);
    }

    function renderReadout(width, height, count, mode) {
      readout.textContent = `${width} x ${height}  |  ${count} lights  |  ${mode}  |  Live Preview${exportStatus ? `  |  ${exportStatus}` : ""}`;
    }

    function syncLargeShapeEditor() {
      largeShapeCtx.setTransform(1, 0, 0, 1, 0, 0);
      largeShapeCtx.globalCompositeOperation = "source-over";
      largeShapeCtx.fillStyle = "#000";
      largeShapeCtx.fillRect(0, 0, largeShapeEditor.width, largeShapeEditor.height);
      largeShapeCtx.drawImage(shapeEditor, 0, 0);
    }

    function updateDrawToolButtons() {
      document.querySelectorAll("[data-draw-tool]").forEach(button => {
        button.classList.toggle("is-active", button.dataset.drawTool === currentDrawTool);
      });
    }

    function updateTextureControls() {
      textureControls.hidden = currentShapePreset !== "custom-image";
    }

    function clearShapeEditor() {
      shapeCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapeCtx.globalCompositeOperation = "source-over";
      shapeCtx.fillStyle = "#000";
      shapeCtx.fillRect(0, 0, shapeEditor.width, shapeEditor.height);
      shapeBaseCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapeBaseCtx.clearRect(0, 0, SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
      shapePaintCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapePaintCtx.clearRect(0, 0, SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
      importedShapeTextureCtx.setTransform(1, 0, 0, 1, 0, 0);
      updateTextureControls();
    }

    function composeShapeLayers() {
      shapeCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapeCtx.globalCompositeOperation = "source-over";
      shapeCtx.fillStyle = "#000";
      shapeCtx.fillRect(0, 0, shapeEditor.width, shapeEditor.height);
      shapeCtx.drawImage(shapeBaseLayer, 0, 0);
      shapeCtx.drawImage(shapePaintLayer, 0, 0);
      syncLargeShapeEditor();
      markShapeChanged();
    }

    function polygonPath(context, sides, radius) {
      context.beginPath();
      for (let i = 0; i < sides; i++) {
        const angle = -Math.PI * 0.5 + i / sides * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        if (i === 0) context.moveTo(x, y);
        else context.lineTo(x, y);
      }
      context.closePath();
    }

    function starPath(context, points, outerRadius, innerRadius) {
      context.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const radius = i % 2 === 0 ? outerRadius : innerRadius;
        const angle = -Math.PI * 0.5 + i / (points * 2) * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        if (i === 0) context.moveTo(x, y);
        else context.lineTo(x, y);
      }
      context.closePath();
    }

    function redrawShapeBase() {
      shapeBaseCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapeBaseCtx.clearRect(0, 0, SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
      if (currentShapePreset === "custom-image") {
        drawImportedShapeBase();
        return;
      }
      shapeBaseCtx.save();
      shapeBaseCtx.translate(SHAPE_TEXTURE_SIZE * 0.5, SHAPE_TEXTURE_SIZE * 0.5);
      shapeBaseCtx.rotate(params.shapeRotation * Math.PI / 180);
      const shapeScale = Math.max(0.35, Math.min(1.4, params.shapeScale));
      shapeBaseCtx.scale(shapeScale, shapeScale);
      shapeBaseCtx.fillStyle = "#fff";
      shapeBaseCtx.beginPath();

      if (currentShapePreset === "default") {
        aperturePath(shapeBaseCtx, 112);
        shapeBaseCtx.fill();
      } else if (currentShapePreset === "rectangle") {
        shapeBaseCtx.rect(-96, -72, 192, 144);
        shapeBaseCtx.fill();
      } else if (currentShapePreset === "hexagon") {
        polygonPath(shapeBaseCtx, 6, 112);
        shapeBaseCtx.fill();
      } else if (currentShapePreset === "star") {
        starPath(shapeBaseCtx, 6, 116, 62);
        shapeBaseCtx.fill();
      } else if (currentShapePreset === "anamorphic") {
        shapeBaseCtx.roundRect(-118, -28, 236, 56, 28);
        shapeBaseCtx.fill();
      } else if (currentShapePreset === "ring") {
        shapeBaseCtx.arc(0, 0, 116, 0, Math.PI * 2);
        shapeBaseCtx.fill();
        shapeBaseCtx.globalCompositeOperation = "destination-out";
        shapeBaseCtx.beginPath();
        shapeBaseCtx.arc(0, 0, 54, 0, Math.PI * 2);
        shapeBaseCtx.fill();
      } else {
        const radiusX = currentShapePreset === "ellipse" ? 118 : 118;
        const radiusY = currentShapePreset === "ellipse" ? 76 : 118;
        shapeBaseCtx.ellipse(0, 0, radiusX, radiusY, 0, 0, Math.PI * 2);
        shapeBaseCtx.fill();
      }

      shapeBaseCtx.restore();
      composeShapeLayers();
    }

    function drawImportedShapeBase() {
      shapeBaseCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapeBaseCtx.clearRect(0, 0, SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
      shapeBaseCtx.save();
      shapeBaseCtx.translate(SHAPE_TEXTURE_SIZE * 0.5, SHAPE_TEXTURE_SIZE * 0.5);
      shapeBaseCtx.rotate(params.shapeRotation * Math.PI / 180);
      const shapeScale = Math.max(0.35, Math.min(1.4, params.shapeScale));
      shapeBaseCtx.scale(shapeScale, shapeScale);
      shapeBaseCtx.drawImage(importedShapeTextureCanvas, -SHAPE_TEXTURE_SIZE * 0.5, -SHAPE_TEXTURE_SIZE * 0.5);
      shapeBaseCtx.restore();
      composeShapeLayers();
    }

    function drawShapePreset(preset) {
      currentShapePreset = preset;
      shapePaintCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapePaintCtx.clearRect(0, 0, SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
      updateTextureControls();
      redrawShapeBase();
    }

    function shapeEditorPoint(event, targetCanvas = shapeEditor) {
      const rect = targetCanvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * targetCanvas.width / rect.width,
        y: (event.clientY - rect.top) * targetCanvas.height / rect.height
      };
    }

    function createBrushStamp(color) {
      const radius = Math.max(2, params.brushSize * 0.5);
      const size = Math.ceil(radius * 2 + 4);
      const stamp = document.createElement("canvas");
      stamp.width = stamp.height = size;
      const stampCtx = stamp.getContext("2d", { alpha: true });
      const center = size * 0.5;
      const softness = Math.max(0, Math.min(1, params.brushSoftness));
      const solidStop = Math.max(0, Math.min(0.92, 1 - softness));
      const grad = stampCtx.createRadialGradient(center, center, radius * solidStop, center, center, radius);
      grad.addColorStop(0, color);
      grad.addColorStop(1, color.replace(")", ", 0)").replace("rgb", "rgba"));
      stampCtx.fillStyle = grad;
      stampCtx.beginPath();
      stampCtx.arc(center, center, radius, 0, Math.PI * 2);
      stampCtx.fill();
      return { stamp, radius, size };
    }

    function stampBrush(point, brush) {
      shapePaintCtx.drawImage(brush.stamp, point.x - brush.size * 0.5, point.y - brush.size * 0.5);
    }

    function drawOnShapeEditor(point) {
      if (currentShapePreset === "default") {
        currentShapePreset = "circle";
        redrawShapeBase();
      }
      shapePaintCtx.save();
      shapePaintCtx.globalAlpha = Math.max(0.02, Math.min(1, params.brushOpacity));
      if (currentDrawTool === "erase") {
        shapePaintCtx.globalCompositeOperation = "destination-out";
      } else {
        shapePaintCtx.globalCompositeOperation = "source-over";
      }
      const brushColor = currentDrawTool === "black" ? "rgb(0, 0, 0)" : hexToRgbString(shapeDrawColor.value);
      const brush = createBrushStamp(brushColor);
      if (lastShapePoint) {
        const distance = Math.hypot(point.x - lastShapePoint.x, point.y - lastShapePoint.y);
        const steps = Math.max(1, Math.ceil(distance / Math.max(1, brush.radius * 0.45)));
        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          stampBrush({ x: lerp(lastShapePoint.x, point.x, t), y: lerp(lastShapePoint.y, point.y, t) }, brush);
        }
      } else {
        stampBrush(point, brush);
      }
      shapePaintCtx.restore();
      lastShapePoint = point;
      composeShapeLayers();
    }

    function drawCropPreview() {
      if (!importedShapeImage) return;
      shapeCrop.style.display = "block";
      shapeCropCtx.setTransform(1, 0, 0, 1, 0, 0);
      shapeCropCtx.fillStyle = "#000";
      shapeCropCtx.fillRect(0, 0, shapeCrop.width, shapeCrop.height);

      const imageScale = Math.max(shapeCrop.width / importedShapeImage.width, shapeCrop.height / importedShapeImage.height) * cropState.scale;
      const drawWidth = importedShapeImage.width * imageScale;
      const drawHeight = importedShapeImage.height * imageScale;
      const drawX = cropState.centerX - drawWidth * 0.5;
      const drawY = cropState.centerY - drawHeight * 0.5;
      shapeCropCtx.drawImage(importedShapeImage, drawX, drawY, drawWidth, drawHeight);

      cropBoxSize = Math.min(shapeCrop.width, shapeCrop.height);
      const boxX = (shapeCrop.width - cropBoxSize) * 0.5;
      const boxY = (shapeCrop.height - cropBoxSize) * 0.5;
      shapeCropCtx.save();
      shapeCropCtx.fillStyle = "rgba(0, 0, 0, 0.42)";
      shapeCropCtx.fillRect(0, 0, shapeCrop.width, boxY);
      shapeCropCtx.fillRect(0, boxY + cropBoxSize, shapeCrop.width, shapeCrop.height - boxY - cropBoxSize);
      shapeCropCtx.fillRect(0, boxY, boxX, cropBoxSize);
      shapeCropCtx.fillRect(boxX + cropBoxSize, boxY, shapeCrop.width - boxX - cropBoxSize, cropBoxSize);
      shapeCropCtx.strokeStyle = "rgba(240, 210, 138, 0.95)";
      shapeCropCtx.lineWidth = 2;
      shapeCropCtx.strokeRect(boxX + 1, boxY + 1, cropBoxSize - 2, cropBoxSize - 2);
      shapeCropCtx.restore();
    }

    function loadShapeImage(file) {
      if (!file || !file.type.startsWith("image/")) return;
      const image = new Image();
      image.onload = () => {
        URL.revokeObjectURL(image.src);
        importedShapeImage = image;
        cropState.centerX = shapeCrop.width * 0.5;
        cropState.centerY = shapeCrop.height * 0.5;
        cropState.scale = 1;
        drawCropPreview();
      };
      image.src = URL.createObjectURL(file);
    }

    function cropPoint(event) {
      const rect = shapeCrop.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * shapeCrop.width / rect.width,
        y: (event.clientY - rect.top) * shapeCrop.height / rect.height
      };
    }

    function applyImageCropToShape() {
      if (!importedShapeImage) return;
      clearShapeEditor();
      const imageScale = Math.max(shapeEditor.width / importedShapeImage.width, shapeEditor.height / importedShapeImage.height) * cropState.scale;
      const drawWidth = importedShapeImage.width * imageScale;
      const drawHeight = importedShapeImage.height * imageScale;
      const offsetX = shapeEditor.width * 0.5 - cropState.centerX;
      const offsetY = shapeEditor.height * 0.5 - cropState.centerY;
      rawImportedShapeTextureCtx.setTransform(1, 0, 0, 1, 0, 0);
      rawImportedShapeTextureCtx.clearRect(0, 0, SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
      rawImportedShapeTextureCtx.drawImage(importedShapeImage, offsetX + cropState.centerX - drawWidth * 0.5, offsetY + cropState.centerY - drawHeight * 0.5, drawWidth, drawHeight);
      preserveImportedBokehTexture();
      currentShapePreset = "custom-image";
      updateTextureControls();
      drawImportedShapeBase();
    }

    function preserveImportedBokehTexture() {
      applyTextureLevels();
    }

    function applyTextureLevels() {
      const sourceData = rawImportedShapeTextureCtx.getImageData(0, 0, SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
      const imageData = importedShapeTextureCtx.createImageData(SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
      const black = Math.max(0, Math.min(0.85, params.textureBlack));
      const white = Math.max(black + 0.02, Math.min(1, params.textureWhite));
      const gamma = Math.max(0.25, Math.min(3, params.textureGamma));
      for (let i = 0; i < imageData.data.length; i += 4) {
        const sr = sourceData.data[i];
        const sg = sourceData.data[i + 1];
        const sb = sourceData.data[i + 2];
        const luminance = Math.max(sr, sg, sb) / 255;
        const normalized = Math.max(0, Math.min(1, (luminance - black) / (white - black)));
        const energy = Math.pow(normalized, 1 / gamma);
        if (energy <= 0.002) {
          imageData.data[i] = 0;
          imageData.data[i + 1] = 0;
          imageData.data[i + 2] = 0;
        } else {
          const scale = energy / Math.max(0.001, luminance);
          imageData.data[i] = Math.min(255, sr * scale);
          imageData.data[i + 1] = Math.min(255, sg * scale);
          imageData.data[i + 2] = Math.min(255, sb * scale);
        }
        imageData.data[i + 3] = 255;
      }
      importedShapeTextureCtx.putImageData(imageData, 0, 0);
    }

    document.querySelectorAll("[data-shape-preset]").forEach(button => {
      button.addEventListener("click", () => {
        drawShapePreset(button.dataset.shapePreset);
      });
    });

    document.querySelectorAll("[data-draw-tool]").forEach(button => {
      button.addEventListener("click", () => {
        currentDrawTool = button.dataset.drawTool;
        updateDrawToolButtons();
      });
    });

    document.querySelector("#shape-clear").addEventListener("click", () => {
      clearShapeEditor();
      currentShapePreset = "custom";
      markShapeChanged();
    });

    document.querySelector("#shape-import-trigger").addEventListener("click", () => {
      shapeImport.click();
    });

    document.querySelector("#shape-apply-crop").addEventListener("click", applyImageCropToShape);

    shapeImport.addEventListener("change", () => {
      loadShapeImage(shapeImport.files?.[0]);
    });

    function attachShapeDrawing(targetCanvas) {
      targetCanvas.addEventListener("pointerdown", event => {
        isDrawingShape = true;
        lastShapePoint = null;
        targetCanvas.setPointerCapture(event.pointerId);
        drawOnShapeEditor(shapeEditorPoint(event, targetCanvas));
      });

      targetCanvas.addEventListener("pointermove", event => {
        if (!isDrawingShape) return;
        drawOnShapeEditor(shapeEditorPoint(event, targetCanvas));
      });

      targetCanvas.addEventListener("pointerup", event => {
        isDrawingShape = false;
        lastShapePoint = null;
        targetCanvas.releasePointerCapture(event.pointerId);
      });

      targetCanvas.addEventListener("pointercancel", () => {
        isDrawingShape = false;
        lastShapePoint = null;
      });
    }

    attachShapeDrawing(largeShapeEditor);

    function openShapeWorkspace() {
      syncLargeShapeEditor();
      shapeWorkspace.classList.add("is-open");
    }

    shapeEditor.addEventListener("click", openShapeWorkspace);
    document.querySelector("#shape-edit-large").addEventListener("click", openShapeWorkspace);

    document.querySelector("#shape-close-large").addEventListener("click", () => {
      shapeWorkspace.classList.remove("is-open");
    });

    shapeCrop.addEventListener("pointerdown", event => {
      if (!importedShapeImage) return;
      isDraggingCrop = true;
      cropDragStart = { point: cropPoint(event), centerX: cropState.centerX, centerY: cropState.centerY };
      shapeCrop.setPointerCapture(event.pointerId);
    });

    shapeCrop.addEventListener("pointermove", event => {
      if (!isDraggingCrop || !cropDragStart) return;
      const point = cropPoint(event);
      cropState.centerX = cropDragStart.centerX + point.x - cropDragStart.point.x;
      cropState.centerY = cropDragStart.centerY + point.y - cropDragStart.point.y;
      drawCropPreview();
    });

    shapeCrop.addEventListener("pointerup", event => {
      isDraggingCrop = false;
      cropDragStart = null;
      shapeCrop.releasePointerCapture(event.pointerId);
    });

    shapeCrop.addEventListener("wheel", event => {
      if (!importedShapeImage) return;
      event.preventDefault();
      const zoom = event.deltaY < 0 ? 1.08 : 0.92;
      cropState.scale = clamp(cropState.scale * zoom, 0.35, 5);
      drawCropPreview();
    }, { passive: false });

    updateDrawToolButtons();
    drawShapePreset("default");

    function applyCustomShapeClip(context, radius) {
      context.beginPath();
      context.rect(-radius, -radius, radius * 2, radius * 2);
      context.clip();
      context.globalCompositeOperation = "destination-in";
      context.drawImage(shapeEditor, -radius, -radius, radius * 2, radius * 2);
      context.globalCompositeOperation = "lighter";
    }

    function applyCustomShapeTexture(context, radius, alpha = 1) {
      context.save();
      context.globalCompositeOperation = "multiply";
      context.globalAlpha = Math.max(0, Math.min(1, alpha));
      context.drawImage(shapeEditor, -radius, -radius, radius * 2, radius * 2);
      context.restore();
      context.globalCompositeOperation = "lighter";
    }

    function resizeLayer(layer, layerCtx, width, height) {
      if (layer.width !== width || layer.height !== height) {
        layer.width = width;
        layer.height = height;
      }
      layerCtx.setTransform(1, 0, 0, 1, 0, 0);
      layerCtx.globalCompositeOperation = "source-over";
      layerCtx.globalAlpha = 1;
      layerCtx.filter = "none";
      layerCtx.clearRect(0, 0, width, height);
    }

    function prepareBokehLayers(width, height) {
      resizeLayer(bokehLayer, bokehCtx, width, height);
      resizeLayer(bloomLayer, bloomCtx, width, height);
    }

    function compositeBokehLayer(width, height) {
      const bloomAmount = Math.max(0, Math.min(1, params.bloom));
      const softBlur = Math.max(0.25, Math.min(0.7, Math.min(width, height) * 0.00055));
      const bloomBlur = Math.max(2.2, Math.min(10, Math.min(width, height) * (0.003 + bloomAmount * 0.005)));

      if (bloomAmount <= 0.001) {
        bloomCtx.clearRect(0, 0, width, height);
      } else {
        bloomCtx.save();
        bloomCtx.globalCompositeOperation = "source-over";
        bloomCtx.globalAlpha = bloomAmount * 0.3;
        bloomCtx.filter = `blur(${bloomBlur}px) brightness(${1.02 + bloomAmount * 0.18})`;
        bloomCtx.drawImage(bokehLayer, 0, 0);
        bloomCtx.restore();
        bloomCtx.filter = "none";

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = bloomAmount * 0.22;
        ctx.drawImage(bloomLayer, 0, 0);
        ctx.restore();
      }

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = 0.98;
      ctx.filter = `blur(${softBlur}px) brightness(0.98)`;
      ctx.drawImage(bokehLayer, 0, 0);
      ctx.restore();
      ctx.filter = "none";
    }

    function rebuildRandomizedLayout() {
      const layoutRand = seededRandom(layoutSeed);
      randomizedLayout = lights.map(light => {
        const laneBias = layoutRand();
        const radial = Math.sqrt(layoutRand());
        const angle = layoutRand() * Math.PI * 2;
        const frameX = laneBias < 0.5
          ? 0.06 + layoutRand() * 0.88
          : 0.5 + Math.cos(angle) * radial * 0.44;
        const frameY = laneBias < 0.5
          ? 0.18 + layoutRand() * 0.64
          : 0.48 + Math.sin(angle) * radial * 0.34;
        return {
          x: clamp(frameX, 0.04, 0.96),
          y: clamp(frameY, 0.14, 0.86),
          depth: clamp(light.anchorDepth + (layoutRand() - 0.5) * 0.38, 0.12, 1.08)
        };
      });
    }

    rebuildRandomizedLayout();

    function resize() {
      const pixelRatioCap = 1;
      const ratio = Math.min(window.devicePixelRatio || 1, pixelRatioCap);
      const width = Math.floor(window.innerWidth * ratio);
      const height = Math.floor(window.innerHeight * ratio);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function exportFrame() {
      canvas.toBlob(blob => {
        if (!blob) {
          setExportStatus("PNG export failed");
          return;
        }
        downloadBlob(blob, `bokeh-frame-${canvas.width}x${canvas.height}.png`);
        setExportStatus(`Saved PNG ${canvas.width} x ${canvas.height}`);
      }, "image/png");
    }

    function chooseMp4MimeType() {
      if (!window.MediaRecorder) return "";
      const candidates = [
        'video/mp4; codecs="avc1.42E01E"',
        'video/mp4; codecs="h264"',
        "video/mp4"
      ];
      return candidates.find(type => MediaRecorder.isTypeSupported(type)) || "";
    }

    function exportVideo() {
      const mimeType = chooseMp4MimeType();
      if (!mimeType || !canvas.captureStream) {
        setExportStatus("MP4 recording is not supported in this browser");
        return;
      }

      const stream = canvas.captureStream(30);
      const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 18000000 });
      const chunks = [];
      recorder.addEventListener("dataavailable", event => {
        if (event.data && event.data.size > 0) chunks.push(event.data);
      });
      recorder.addEventListener("stop", () => {
        stream.getTracks().forEach(track => track.stop());
        if (!chunks.length) {
          setExportStatus("MP4 export failed");
          return;
        }
        const blob = new Blob(chunks, { type: mimeType });
        downloadBlob(blob, `bokeh-video-${canvas.width}x${canvas.height}.mp4`);
        setExportStatus(`Saved MP4 ${canvas.width} x ${canvas.height}`);
      });
      recorder.start();
      setExportStatus(`Recording MP4 ${canvas.width} x ${canvas.height}`);
      window.setTimeout(() => {
        if (recorder.state !== "inactive") recorder.stop();
      }, 4200);
    }
