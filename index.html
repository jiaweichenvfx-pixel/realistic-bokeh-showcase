    function rgba(color, alpha) {
      return `rgba(${Math.round(color[0])}, ${Math.round(color[1])}, ${Math.round(color[2])}, ${alpha})`;
    }

    function hexToRgbString(hex) {
      const value = hex.replace("#", "");
      const parsed = Number.parseInt(value.length === 3 ? value.split("").map(ch => ch + ch).join("") : value, 16);
      const r = (parsed >> 16) & 255;
      const g = (parsed >> 8) & 255;
      const b = parsed & 255;
      return `rgb(${r}, ${g}, ${b})`;
    }

    function mix(color, target, amount) {
      return [
        color[0] + (target[0] - color[0]) * amount,
        color[1] + (target[1] - color[1]) * amount,
        color[2] + (target[2] - color[2]) * amount
      ];
    }

    function hslToRgb(hue, saturation, lightness) {
      const h = ((hue % 360) + 360) % 360 / 360;
      const s = Math.max(0, Math.min(1, saturation));
      const l = Math.max(0, Math.min(1, lightness));
      if (s === 0) {
        const gray = l * 255;
        return [gray, gray, gray];
      }
      const q = l < 0.5 ? l * (1 + s) : l + s - l * s;
      const p = 2 * l - q;
      const hueToChannel = t => {
        let channel = t;
        if (channel < 0) channel += 1;
        if (channel > 1) channel -= 1;
        if (channel < 1 / 6) return p + (q - p) * 6 * channel;
        if (channel < 1 / 2) return q;
        if (channel < 2 / 3) return p + (q - p) * (2 / 3 - channel) * 6;
        return p;
      };
      return [
        hueToChannel(h + 1 / 3) * 255,
        hueToChannel(h) * 255,
        hueToChannel(h - 1 / 3) * 255
      ];
    }

    function lightColorNoise(light, salt = 0) {
      const raw = Math.sin((light.index + 1) * 91.71 + light.textureSeed * 0.113 + salt * 47.37) * 43758.5453;
      return raw - Math.floor(raw);
    }

    function textureVariationForLight(light) {
      const angle = (lightColorNoise(light, 6) - 0.5) * 0.18;
      return [
        Math.cos(angle),
        Math.sin(angle),
        (lightColorNoise(light, 7) - 0.5) * 0.035,
        (lightColorNoise(light, 8) - 0.5) * 0.035
      ];
    }

    function lightMotionOffset(light, time) {
      const motionAmount = Math.max(0, Math.min(1, params.motionAmount));
      const animationSpeed = Math.max(0.25, Math.min(4, params.motionSpeed));
      const drift = light.drift || 0.1;
      const phase = light.phase || 0;
      const depthScale = 0.55 + (1 - Math.min(1, light.anchorDepth || 0.5)) * 0.7;
      const speed = animationSpeed * (4.5 + drift * 5.5);
      return {
        x: Math.sin(time * speed + phase) * 0.012 * motionAmount * depthScale,
        y: Math.cos(time * speed * 0.73 + phase) * 0.0085 * motionAmount * depthScale
      };
    }

    function lightTwinkle(light, time) {
      const flickerAmount = Math.max(0, Math.min(1, params.flickerAmount));
      const animationSpeed = Math.max(0.25, Math.min(4, params.motionSpeed));
      const phase = light.phase || 0;
      const slowWave = Math.sin(time * 1.4 * animationSpeed + phase);
      const fastWave = Math.sin(time * 4.2 * animationSpeed + phase * 1.37) * 0.34;
      return 1 + (slowWave + fastWave) * 0.12 * flickerAmount;
    }

    function resolveLightColor(light) {
      const colorRandomness = Math.max(0, Math.min(1, params.colorRandomness));
      const baseColor = hslToRgb(params.baseHue, 0.58, 0.68);
      if (colorRandomness <= 0.001) return baseColor;

      const sourceColor = mix(baseColor, light.color, Math.min(0.82, 0.22 + colorRandomness * 0.62));
      const hueJitter = (lightColorNoise(light, 1) - 0.5) * 360 * colorRandomness;
      const randomHue = params.baseHue + hueJitter + lightColorNoise(light, 2) * 360 * Math.pow(colorRandomness, 2.4);
      const randomColor = hslToRgb(
        randomHue,
        0.42 + lightColorNoise(light, 3) * 0.32,
        0.52 + lightColorNoise(light, 4) * 0.22
      );
      return mix(sourceColor, randomColor, Math.pow(colorRandomness, 1.8) * 0.9);
    }

    function resolveLightOpacity(light, alpha) {
      const opacityRandomness = Math.max(0, Math.min(1, params.opacityRandomness));
      const opacityNoise = 0.55 + lightColorNoise(light, 5) * 0.65;
      return alpha * (1 + (opacityNoise - 1) * opacityRandomness);
    }

    function aperturePath(context, radius) {
      const sides = Math.max(3, Math.round(params.blades));
      const roundness = Math.max(0, Math.min(1, params.roundness));
      if (roundness > 0.94) {
        context.beginPath();
        context.arc(0, 0, radius, 0, Math.PI * 2);
        return;
      }

      const points = [];
      const rotation = -Math.PI / 2 + Math.PI / sides;
      for (let i = 0; i < sides; i++) {
        const a = rotation + i * Math.PI * 2 / sides;
        points.push([Math.cos(a) * radius, Math.sin(a) * radius]);
      }

      context.beginPath();
      for (let i = 0; i < sides; i++) {
        const prev = points[(i - 1 + sides) % sides];
        const current = points[i];
        const next = points[(i + 1) % sides];
        const inset = roundness * 0.46;
        const start = [
          current[0] + (prev[0] - current[0]) * inset,
          current[1] + (prev[1] - current[1]) * inset
        ];
        const end = [
          current[0] + (next[0] - current[0]) * inset,
          current[1] + (next[1] - current[1]) * inset
        ];
        if (i === 0) context.moveTo(start[0], start[1]);
        context.quadraticCurveTo(current[0], current[1], end[0], end[1]);
      }
      context.closePath();
    }

    function drawBackground(width, height, time) {
      ctx.globalCompositeOperation = "source-over";
      ctx.filter = "none";
      const bg = ctx.createLinearGradient(0, 0, 0, height);
      bg.addColorStop(0, "#030407");
      bg.addColorStop(0.48, "#060407");
      bg.addColorStop(1, "#010102");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      const vignette = ctx.createRadialGradient(width * 0.48, height * 0.42, 0, width * 0.5, height * 0.5, Math.max(width, height) * 0.72);
      vignette.addColorStop(0, "rgba(45, 35, 46, 0.3)");
      vignette.addColorStop(0.56, "rgba(12, 10, 14, 0.12)");
      vignette.addColorStop(1, "rgba(0, 0, 0, 0.78)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = 0.28;
      const road = ctx.createLinearGradient(0, height * 0.34, 0, height);
      road.addColorStop(0, "rgba(0, 0, 0, 0)");
      road.addColorStop(1, "rgba(56, 42, 30, 0.22)");
      ctx.fillStyle = road;
      ctx.fillRect(0, height * 0.34, width, height * 0.66);
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.02;
      ctx.fillStyle = "#fff5d6";
      for (let i = 0; i < 240; i++) {
        const x = (Math.sin(i * 12.9898) * 43758.5453) % 1;
        const y = (Math.sin(i * 78.233) * 19341.117) % 1;
        ctx.fillRect(Math.abs(x) * width, Math.abs(y) * height, 1, 1);
      }
      ctx.restore();

      drawDefocusedBackdrop(width, height, time);

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (let i = 0; i < 18; i++) {
        const x = width * (0.12 + ((i * 37) % 100) / 130);
        const y = height * (0.18 + ((i * 19) % 70) / 160);
        const pulse = 0.65 + 0.35 * Math.sin(time * 0.6 + i);
        ctx.fillStyle = rgba(i % 3 === 0 ? coolWhite : warm, 0.06 * pulse);
        ctx.beginPath();
        ctx.arc(x, y, Math.max(1.2, width * 0.0015), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawDefocusedBackdrop(width, height, time) {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.filter = `blur(${Math.max(10, width * 0.008)}px)`;
      ctx.globalAlpha = 0.42;

      const rows = [
        { y: 0.29, count: 6, spread: 0.54, start: 0.28, size: 0.018, color: warm },
        { y: 0.42, count: 8, spread: 0.72, start: 0.18, size: 0.024, color: sodium },
        { y: 0.58, count: 5, spread: 0.58, start: 0.33, size: 0.028, color: red }
      ];

      for (const row of rows) {
        for (let i = 0; i < row.count; i++) {
          const wave = Math.sin(time * 0.16 + i * 1.7) * 0.008;
          const x = width * (row.start + (i / Math.max(1, row.count - 1)) * row.spread + wave);
          const y = height * (row.y + Math.sin(i * 2.31) * 0.025);
          const r = Math.max(12, width * row.size * (0.72 + (i % 4) * 0.12));
          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, rgba(mix(row.color, [255, 248, 220], 0.35), 0.42));
          g.addColorStop(0.48, rgba(row.color, 0.18));
          g.addColorStop(1, rgba(row.color, 0));
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.filter = `blur(${Math.max(6, width * 0.005)}px)`;
      ctx.globalAlpha = 0.18;
      for (let i = 0; i < 9; i++) {
        const x = width * (0.15 + i * 0.06);
        const y = height * (0.72 + Math.sin(i) * 0.05);
        const w = width * (0.025 + (i % 3) * 0.014);
        const h = height * (0.08 + (i % 4) * 0.025);
        const color = i % 4 === 0 ? red : i % 3 === 0 ? warm : sodium;
        const reflection = ctx.createLinearGradient(x, y - h, x, y + h);
        reflection.addColorStop(0, rgba(color, 0));
        reflection.addColorStop(0.35, rgba(color, 0.25));
        reflection.addColorStop(1, rgba(color, 0));
        ctx.fillStyle = reflection;
        ctx.fillRect(x - w * 0.5, y - h, w, h * 2);
      }

      ctx.restore();
      ctx.filter = "none";
    }

    function drawGlowDisc(x, y, radius, color, strength) {
      const bloomAmount = Math.max(0, Math.min(1, params.bloom));
      if (bloomAmount <= 0.001) return;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.filter = `blur(${Math.max(3, radius * (0.08 + bloomAmount * 0.18))}px)`;
      ctx.fillStyle = rgba(mix(color, [255, 238, 205], 0.16), 0.09 * bloomAmount * strength);
      ctx.beginPath();
      ctx.arc(x, y, radius * (0.72 + bloomAmount * 0.18), 0, Math.PI * 2);
      ctx.fill();
      ctx.filter = "none";
      ctx.restore();
    }

    function drawApertureDisc(x, y, radius, color, alpha, scaleX, scaleY, edgeAmount) {
      const rim = Math.max(-1, Math.min(1, params.rimBias));
      const centerAberration = Math.max(0, -rim);
      const edgeAberration = Math.max(0, rim);

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scaleX, scaleY);
      aperturePath(ctx, radius);
      ctx.clip();

      ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = rgba(color, alpha * (0.18 + edgeAberration * 0.03));
      ctx.beginPath();
      aperturePath(ctx, radius * 0.965);
      ctx.fill();

      const grad = ctx.createRadialGradient(-radius * 0.04, -radius * 0.06, radius * 0.1, 0, 0, radius);
      grad.addColorStop(0, rgba(mix(color, [255, 247, 224], 0.18), alpha * centerAberration * 0.22));
      grad.addColorStop(0.42, rgba(color, alpha * 0.018));
      grad.addColorStop(0.74, rgba(color, alpha * 0.026));
      grad.addColorStop(0.91, rgba(mix(color, [255, 255, 255], 0.12), alpha * edgeAberration * 0.16));
      grad.addColorStop(1, rgba(color, 0));
      ctx.fillStyle = grad;
      ctx.fillRect(-radius, -radius, radius * 2, radius * 2);

      const onionStrength = Math.min(0.022, alpha * (0.003 + edgeAberration * 0.006 + radius / 6400));
      ctx.lineWidth = Math.max(0.45, radius * 0.006);
      ctx.strokeStyle = rgba(mix(color, [255, 248, 226], 0.42), onionStrength);
      for (let i = 0; i < 3; i++) {
        const ringRadius = radius * (0.32 + i * 0.19 + Math.sin((i + 1) * 1.7 + radius * 0.013) * 0.012);
        ctx.beginPath();
        ctx.ellipse(0, 0, ringRadius, ringRadius * (0.985 + i * 0.004), 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.lineWidth = Math.max(0.7, radius * 0.01);
      ctx.strokeStyle = rgba(mix(color, [255, 255, 255], 0.24), alpha * (0.004 + edgeAmount * 0.01 + edgeAberration * 0.035));
      aperturePath(ctx, radius * 0.99);
      ctx.stroke();
      applyCustomShapeTexture(ctx, radius, 0.86);
      applyCustomShapeClip(ctx, radius);
      ctx.restore();
    }

    function drawSmallLight(x, y, radius, color, alpha) {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const glow = ctx.createRadialGradient(x, y, 0, x, y, radius * 3.2);
      glow.addColorStop(0, rgba(mix(color, [255, 248, 224], 0.25), Math.min(0.8, alpha)));
      glow.addColorStop(0.35, rgba(color, alpha * 0.28));
      glow.addColorStop(1, rgba(color, 0));
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, radius * 3.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = rgba(mix(color, [255, 250, 230], 0.42), Math.min(0.72, alpha * 0.58));
      ctx.beginPath();
      ctx.arc(x, y, Math.max(1.2, radius * 0.54), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawWetReflection(x, y, radius, color, alpha, width, height) {
      if (y < height * 0.46 || radius < 3) return;
      const reflectionHeight = radius * (2.4 + (y / height) * 2.2);
      const reflectionWidth = Math.max(3, radius * 0.44);
      const top = y + radius * 0.45;
      const roadFade = Math.min(1, (y / height - 0.42) / 0.44);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.filter = `blur(${Math.max(2, radius * 0.18)}px)`;
      ctx.globalAlpha = Math.min(0.42, alpha * 0.28 * roadFade);
      const reflection = ctx.createLinearGradient(x, top, x, top + reflectionHeight);
      reflection.addColorStop(0, rgba(mix(color, [255, 236, 205], 0.16), 0.5));
      reflection.addColorStop(0.38, rgba(color, 0.2));
      reflection.addColorStop(1, rgba(color, 0));
      ctx.fillStyle = reflection;
      ctx.beginPath();
      ctx.ellipse(x, top + reflectionHeight * 0.42, reflectionWidth, reflectionHeight * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.filter = `blur(${Math.max(1, radius * 0.06)}px)`;
      ctx.globalAlpha = Math.min(0.22, alpha * 0.16 * roadFade);
      ctx.fillStyle = rgba(mix(color, [255, 245, 220], 0.28), 0.55);
      ctx.fillRect(x - reflectionWidth * 0.22, top, reflectionWidth * 0.44, reflectionHeight * 0.68);
      ctx.restore();
      ctx.filter = "none";
    }

    function drawDispersionLayer(x, y, radius, alpha, scaleX, scaleY, fringeAngle, edgeAmount) {
      const amount = Math.max(0, Math.min(1, params.chromatic));
      if (amount < 0.01 || radius < 6 || edgeAmount < 0.14) return;

      const offAxis = Math.pow(edgeAmount, 1.55);
      const channelShift = radius * amount * offAxis * 0.055;
      const nx = Math.cos(fringeAngle);
      const ny = Math.sin(fringeAngle);

      ctx.save();
      ctx.translate(x + nx * channelShift, y + ny * channelShift);
      ctx.scale(scaleX, scaleY);
      ctx.globalCompositeOperation = "screen";
      ctx.filter = `blur(${Math.max(0.5, radius * 0.012)}px)`;

      const dispersionRadius = radius * (1 + amount * offAxis * 0.045);
      aperturePath(ctx, dispersionRadius);
      ctx.clip();

      const blue = [142, 172, 255];
      const violet = [118, 120, 232];
      const dispersionAlpha = Math.min(0.34, alpha * amount * offAxis * 0.72);
      const grad = ctx.createRadialGradient(
        -nx * radius * 0.28,
        -ny * radius * 0.28,
        radius * 0.24,
        0,
        0,
        dispersionRadius
      );
      grad.addColorStop(0, rgba(blue, 0));
      grad.addColorStop(0.62, rgba(blue, dispersionAlpha * 0.22));
      grad.addColorStop(0.86, rgba(blue, dispersionAlpha));
      grad.addColorStop(1, rgba(violet, dispersionAlpha * 0.18));
      ctx.fillStyle = grad;
      ctx.fillRect(-dispersionRadius, -dispersionRadius, dispersionRadius * 2, dispersionRadius * 2);

      ctx.restore();
      ctx.filter = "none";
    }

    function drawLight(light, width, height, minDim, time) {
      const layout = randomizedLayout[light.index] || light;
      const randomAmount = Math.max(0, Math.min(1, params.randomness));
      const baseX = lerp(light.anchorX, layout.x, randomAmount);
      const baseY = lerp(light.anchorY, layout.y, randomAmount);
      const depth = lerp(light.anchorDepth, layout.depth, randomAmount);
      const motion = lightMotionOffset(light, time);
      const x = width * (baseX + motion.x);
      const y = height * (baseY + motion.y);
      const dx = (x - width * 0.5) / (width * 0.5);
      const dy = (y - height * 0.48) / (height * 0.5);
      const edgeAmount = Math.min(1, Math.hypot(dx, dy));
      const radius = computeBokehRadius(light, minDim);
      const scaleX = Math.max(0.35, Math.min(2, params.scaleX));
      const scaleY = Math.max(0.35, Math.min(2, params.scaleY));
      const fringeAngle = Math.atan2(dy, dx);
      const twinkle = lightTwinkle(light, time);
      const baseAlpha = Math.min(0.92, light.intensity * params.exposure * twinkle * (radius < 7 ? 0.84 : 0.62));
      const alpha = Math.min(0.94, resolveLightOpacity(light, baseAlpha));
      const resolvedColor = resolveLightColor(light);

      drawWetReflection(x, y, radius, resolvedColor, alpha, width, height);

      if (radius < 5.5) {
        drawSmallLight(x, y, radius, resolvedColor, alpha);
        return;
      }

      drawGlowDisc(x, y, radius, resolvedColor, alpha);
      drawDispersionLayer(x, y, radius, alpha, scaleX, scaleY, fringeAngle, edgeAmount);
      drawApertureDisc(x, y, radius, resolvedColor, alpha, scaleX, scaleY, edgeAmount);
    }

    function render(now) {
      if (document.visibilityState === "hidden") {
        requestAnimationFrame(render);
        return;
      }

      if (now - lastFrameTime < FRAME_INTERVAL_MS) {
        requestAnimationFrame(render);
        return;
      }
      lastFrameTime = now;

      ctx = mainCtx;
      resize();
      const width = canvas.width;
      const height = canvas.height;
      const minDim = Math.min(width, height);
      const time = now * 0.001;

      drawBackground(width, height, time);
      prepareBokehLayers(width, height);
      const activeLightsForFrame = activeLights();
      const sorted = activeLightsForFrame.slice().sort((a, b) => b.depth - a.depth);
      ctx = bokehCtx;
      for (const light of sorted) {
        drawLight(light, width, height, minDim, time);
      }
      ctx = mainCtx;
      compositeBokehLayer(width, height);

      ctx.globalCompositeOperation = "source-over";
      ctx.filter = "none";
      renderReadout(canvas.width, canvas.height, activeLightsForFrame.length, "Canvas");
      requestAnimationFrame(render);
    }

    function createCanvasRenderer() {
      ctx = canvas.getContext("2d", { alpha: false });
      mainCtx = ctx;
      return {
        start() {
          resize();
          requestAnimationFrame(render);
        }
      };
    }

    function writeInstanceData(target, offset, light, width, height, minDim, time) {
      const layout = randomizedLayout[light.index] || light;
      const randomAmount = Math.max(0, Math.min(1, params.randomness));
      const baseX = lerp(light.anchorX, layout.x, randomAmount);
      const baseY = lerp(light.anchorY, layout.y, randomAmount);
      const depth = lerp(light.anchorDepth, layout.depth, randomAmount);
      const motion = lightMotionOffset(light, time);
      const x = width * (baseX + motion.x);
      const y = height * (baseY + motion.y);
      const dx = (x - width * 0.5) / (width * 0.5);
      const dy = (y - height * 0.48) / (height * 0.5);
      const edgeAmount = Math.min(1, Math.hypot(dx, dy));
      const radius = computeBokehRadius(light, minDim);
      const twinkle = lightTwinkle(light, time);
      const baseAlpha = Math.min(0.92, light.intensity * params.exposure * twinkle * (radius < 7 ? 0.84 : 0.62));
      const alpha = Math.min(0.94, resolveLightOpacity(light, baseAlpha));
      const resolvedColor = resolveLightColor(light);
      const centerX = x / width * 2 - 1;
      const centerY = 1 - y / height * 2;
      const scaleX = Math.max(0.35, Math.min(2, params.scaleX));
      const scaleY = Math.max(0.35, Math.min(2, params.scaleY));
      const axisLength = Math.max(0.001, Math.hypot(dx, dy));

      target[offset + 0] = centerX;
      target[offset + 1] = centerY;
      target[offset + 2] = radius * scaleX / width * 2;
      target[offset + 3] = radius * scaleY / height * 2;
      target[offset + 4] = resolvedColor[0] / 255;
      target[offset + 5] = resolvedColor[1] / 255;
      target[offset + 6] = resolvedColor[2] / 255;
      target[offset + 7] = alpha * 0.72;
      target[offset + 8] = Math.max(3, Math.round(params.blades));
      target[offset + 9] = Math.max(0, Math.min(1, params.roundness));
      target[offset + 10] = Math.max(-1, Math.min(1, params.rimBias));
      target[offset + 11] = edgeAmount;
      const bloomAmount = Math.max(0, Math.min(1, params.bloom));
      target[offset + 12] = bloomAmount;
      target[offset + 13] = Math.max(0, Math.min(1, params.chromatic));
      target[offset + 14] = dx / axisLength;
      target[offset + 15] = -dy / axisLength;
      target[offset + 16] = 0;
      target[offset + 17] = currentShapePreset === "default" ? 0 : 1;
      const textureJitter = textureVariationForLight(light);
      target[offset + 18] = textureJitter[0];
      target[offset + 19] = textureJitter[1];
      target[offset + 20] = textureJitter[2];
      target[offset + 21] = textureJitter[3];
    }

    async function createWebGpuRenderer() {
      if (!navigator.gpu) throw new Error("WebGPU unavailable");
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) throw new Error("No WebGPU adapter");
      const device = await adapter.requestDevice();
      const webGpuContext = canvas.getContext("webgpu");
      if (!webGpuContext) throw new Error("No WebGPU canvas context");
      const format = navigator.gpu.getPreferredCanvasFormat();
      const HDR_TEXTURE_FORMAT = "rgba16float";
      const instanceStride = 22;
      const instanceData = new Float32Array(lights.length * instanceStride);
      let hdrBokehTexture = null;
      let hdrBokehView = null;
      let hdrSize = [0, 0];
      let toneMapBindGroup = null;
      let uploadedShapeTextureVersion = -1;
      const shapeMaskTexture = device.createTexture({
        label: "custom bokeh shape mask texture",
        size: [SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE],
        format: "rgba8unorm",
        usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST
      });
      const shapeMaskSampler = device.createSampler({
        addressModeU: "clamp-to-edge",
        addressModeV: "clamp-to-edge",
        magFilter: "linear",
        minFilter: "linear"
      });

      function createHdrTargets(width, height) {
        if (hdrBokehTexture && hdrSize[0] === width && hdrSize[1] === height) return;
        if (hdrBokehTexture) hdrBokehTexture.destroy();
        hdrSize = [width, height];
        hdrBokehTexture = device.createTexture({
          label: "hdr bokeh accumulation texture",
          size: [width, height],
          format: HDR_TEXTURE_FORMAT,
          usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING
        });
        hdrBokehView = hdrBokehTexture.createView();
      }

      const shader = device.createShaderModule({
        label: "bokeh webgpu direct shader",
        code: `
struct VertexOut {
  @builtin(position) position: vec4f,
  @location(0) local: vec2f,
  @location(1) color: vec4f,
  @location(2) lens: vec4f,
  @location(3) bloom: f32,
  @location(4) chromaticAxis: vec4f,
  @location(5) shapeMode: f32,
  @location(6) textureJitter: vec4f,
};
@group(0) @binding(0) var shapeMaskSampler: sampler;
@group(0) @binding(1) var shapeMaskTex: texture_2d<f32>;

@vertex
fn vs(
  @builtin(vertex_index) vertexIndex: u32,
  @location(0) centerRadius: vec4f,
  @location(1) colorAlpha: vec4f,
  @location(2) lens: vec4f,
  @location(3) bloomAmount: f32,
  @location(4) chromaticAxis: vec4f,
  @location(5) shapeMode: f32,
  @location(6) textureJitter: vec4f
) -> VertexOut {
  var quad = array<vec2f, 6>(
    vec2f(-1.45, -1.45),
    vec2f( 1.45, -1.45),
    vec2f(-1.45,  1.45),
    vec2f(-1.45,  1.45),
    vec2f( 1.45, -1.45),
    vec2f( 1.45,  1.45)
  );
  let local = quad[vertexIndex];
  var out: VertexOut;
  out.position = vec4f(centerRadius.xy + local * centerRadius.zw, 0.0, 1.0);
  out.local = local;
  out.color = colorAlpha;
  out.lens = lens;
  out.bloom = bloomAmount;
  out.chromaticAxis = chromaticAxis;
  out.shapeMode = shapeMode;
  out.textureJitter = textureJitter;
  return out;
}

fn apertureMask(local: vec2f, blades: f32, roundness: f32) -> f32 {
  let r = length(local);
  if (roundness > 0.94) {
    return smoothstep(1.0, 0.94, r);
  }
  let angle = atan2(local.y, local.x) + 1.5707963;
  let sector = 6.2831853 / max(3.0, blades);
  let folded = abs((angle / sector - floor(angle / sector + 0.5)) * sector);
  let polygonRadius = cos(sector * 0.5) / max(0.18, cos(folded));
  let mixedRadius = mix(polygonRadius, 1.0, roundness);
  return smoothstep(mixedRadius, mixedRadius * 0.94, r);
}

fn sampleShape(uv: vec2f) -> vec3f {
  if (all(uv >= vec2f(0.0)) && all(uv <= vec2f(1.0))) {
    return textureSampleLevel(shapeMaskTex, shapeMaskSampler, uv, 0.0).rgb;
  }
  return vec3f(0.0);
}

fn rotateLocal(local: vec2f, cs: vec2f) -> vec2f {
  return vec2f(local.x * cs.x - local.y * cs.y, local.x * cs.y + local.y * cs.x);
}

@fragment
fn fs(input: VertexOut) -> @location(0) vec4f {
  let texturedLocal = rotateLocal(input.local, input.textureJitter.xy);
  let shapeUv = texturedLocal * 0.5 + vec2f(0.5) + input.textureJitter.zw;
  let shapeSample = sampleShape(shapeUv);
  let textureMask = max(max(shapeSample.r, shapeSample.g), shapeSample.b);
  let proceduralMask = apertureMask(input.local, input.lens.x, input.lens.y);
  let mask = select(proceduralMask, textureMask, input.shapeMode > 0.5);
  let r = length(input.local);
  let outerGlow = mask * smoothstep(0.96, 1.0, r) * (1.0 - smoothstep(1.0, 1.16, r)) * input.bloom * 0.09;
  if (mask + outerGlow <= 0.001) { discard; }
  let centerAberration = max(0.0, -input.lens.z);
  let edgeAberration = max(0.0, input.lens.z);
  let centerGain = centerAberration * smoothstep(0.54, 0.0, r) * 0.14;
  let edgeGain = edgeAberration * smoothstep(0.62, 1.0, r) * 0.32;
  let offAxisBloom = pow(clamp(input.lens.w, 0.0, 1.0), 1.6) * input.bloom * 0.08;
  let surfaceTexture = 0.97 + 0.018 * sin(dot(input.local, vec2f(31.0, 17.0)) + input.color.a * 13.0) + 0.012 * sin(atan2(input.local.y, input.local.x) * 11.0 + input.lens.w * 7.0);
  let psf = (mask * (0.34 + centerGain + edgeGain + offAxisBloom) + outerGlow) * surfaceTexture;
  let dispersion = clamp(input.chromaticAxis.x * pow(clamp(input.lens.w, 0.0, 1.0), 1.25), 0.0, 1.0);
  let axis = normalize(input.chromaticAxis.yz + vec2f(0.0001, 0.0));
  let redSample = sampleShape(shapeUv - axis * dispersion * 0.018);
  let blueSample = sampleShape(shapeUv + axis * dispersion * 0.026);
  let redTextureMask = max(max(redSample.r, redSample.g), redSample.b);
  let blueTextureMask = max(max(blueSample.r, blueSample.g), blueSample.b);
  let redProceduralMask = apertureMask(input.local - axis * dispersion * 0.036, input.lens.x, input.lens.y);
  let blueProceduralMask = apertureMask(input.local + axis * dispersion * 0.052, input.lens.x, input.lens.y);
  let redMask = select(redProceduralMask, redTextureMask, input.shapeMode > 0.5);
  let blueMask = select(blueProceduralMask, blueTextureMask, input.shapeMode > 0.5);
  let channelMask = mix(vec3f(mask), vec3f(redMask, mask, blueMask), dispersion);
  let safeMask = max(mask, 0.001);
  let textureColor = clamp(shapeSample.rgb / vec3f(safeMask), vec3f(0.0), vec3f(2.2));
  let importedTextureTint = mix(vec3f(1.0), textureColor, smoothstep(0.04, 0.55, mask));
  let textureTint = select(vec3f(1.0), importedTextureTint, input.shapeMode > 0.5);
  let energy = input.color.a * psf * 3.8;
  return vec4f(input.color.rgb * textureTint * channelMask * energy + input.color.rgb * textureTint * outerGlow * input.color.a * 2.2, energy);
}
        `
      });

      const toneMapShader = device.createShaderModule({
        label: "bokeh webgpu tone map shader",
        code: `
struct Out { @builtin(position) position: vec4f, @location(0) uv: vec2f };
@group(0) @binding(0) var hdrTex: texture_2d<f32>;

@vertex
fn vs(@builtin(vertex_index) vertexIndex: u32) -> Out {
  var pos = array<vec2f, 3>(vec2f(-1.0, -1.0), vec2f(3.0, -1.0), vec2f(-1.0, 3.0));
  var out: Out;
  out.position = vec4f(pos[vertexIndex], 0.0, 1.0);
  out.uv = pos[vertexIndex] * 0.5 + vec2f(0.5);
  return out;
}

fn filmicToneMap(color: vec3f) -> vec3f {
  let x = max(vec3f(0.0), color - vec3f(0.004));
  return (x * (6.2 * x + vec3f(0.5))) / (x * (6.2 * x + vec3f(1.7)) + vec3f(0.06));
}

fn compressHdrOverlap(hdr: vec3f) -> vec3f {
  let exposureFusion = 1.35;
  return log(vec3f(1.0) + hdr * exposureFusion) / exposureFusion;
}

@fragment
fn fs(input: Out) -> @location(0) vec4f {
  let y = clamp(input.uv.y, 0.0, 1.0);
  let sceneY = 1.0 - y;
  let road = smoothstep(0.48, 1.0, sceneY);
  let vignette = smoothstep(0.2, 0.95, distance(input.uv, vec2f(0.52, 0.46)));
  let horizonFade = smoothstep(0.38, 0.62, sceneY);
  let sky = vec3f(0.0006, 0.0007, 0.001);
  let asphalt = vec3f(0.0022, 0.0021, 0.002);
  let roadGlow = vec3f(0.002, 0.0013, 0.0008) * smoothstep(0.58, 1.0, sceneY);
  let background = (mix(sky, asphalt, road * horizonFade) + roadGlow) * (1.0 - vignette * 0.82);
  let pixel = vec2i(input.position.xy);
  let hdr = textureLoad(hdrTex, pixel, 0).rgb;
  let compressedHdr = compressHdrOverlap(hdr);
  let color = filmicToneMap(background + compressedHdr * 1.08);
  return vec4f(pow(color, vec3f(1.0 / 2.2)), 1.0);
}
        `
      });

      const shapeMaskBindGroupLayout = device.createBindGroupLayout({
        label: "webgpu bokeh shape mask bind group layout",
        entries: [
          { binding: 0, visibility: GPUShaderStage.FRAGMENT, sampler: { type: "filtering" } },
          { binding: 1, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: "float" } }
        ]
      });

      const shapeMaskBindGroup = device.createBindGroup({
        label: "webgpu bokeh shape mask bind group",
        layout: shapeMaskBindGroupLayout,
        entries: [
          { binding: 0, resource: shapeMaskSampler },
          { binding: 1, resource: shapeMaskTexture.createView() }
        ]
      });

      const bokehPipeline = device.createRenderPipeline({
        label: "webgpu additive bokeh pipeline",
        layout: device.createPipelineLayout({ bindGroupLayouts: [shapeMaskBindGroupLayout] }),
        vertex: {
          module: shader,
          entryPoint: "vs",
          buffers: [{
            arrayStride: instanceStride * 4,
            stepMode: "instance",
            attributes: [
              { shaderLocation: 0, offset: 0, format: "float32x4" },
              { shaderLocation: 1, offset: 16, format: "float32x4" },
              { shaderLocation: 2, offset: 32, format: "float32x4" },
              { shaderLocation: 3, offset: 48, format: "float32" },
              { shaderLocation: 4, offset: 52, format: "float32x4" },
              { shaderLocation: 5, offset: 68, format: "float32" },
              { shaderLocation: 6, offset: 72, format: "float32x4" }
            ]
          }]
        },
        fragment: {
          module: shader,
          entryPoint: "fs",
          targets: [{
            format: HDR_TEXTURE_FORMAT,
            blend: {
              color: { srcFactor: "one", dstFactor: "one", operation: "add" },
              alpha: { srcFactor: "one", dstFactor: "one", operation: "add" }
            }
          }]
        }
      });

      const toneMapBindGroupLayout = device.createBindGroupLayout({
        label: "webgpu tone map bind group layout",
        entries: [{
          binding: 0,
          visibility: GPUShaderStage.FRAGMENT,
          texture: { sampleType: "unfilterable-float" }
        }]
      });

      const toneMapPipeline = device.createRenderPipeline({
        label: "webgpu tone map pipeline",
        layout: device.createPipelineLayout({ bindGroupLayouts: [toneMapBindGroupLayout] }),
        vertex: { module: toneMapShader, entryPoint: "vs" },
        fragment: { module: toneMapShader, entryPoint: "fs", targets: [{ format }] }
      });

      const instanceBuffer = device.createBuffer({
        size: instanceData.byteLength,
        usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST
      });

      function uploadShapeMaskTexture() {
        if (uploadedShapeTextureVersion === shapeTextureVersion) return;
        const shapeImageData = shapeCtx.getImageData(0, 0, SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE);
        device.queue.writeTexture(
          { texture: shapeMaskTexture },
          shapeImageData.data,
          { bytesPerRow: SHAPE_TEXTURE_SIZE * 4, rowsPerImage: SHAPE_TEXTURE_SIZE },
          [SHAPE_TEXTURE_SIZE, SHAPE_TEXTURE_SIZE]
        );
        uploadedShapeTextureVersion = shapeTextureVersion;
      }

      function resizeWebGpu() {
        const pixelRatioCap = 1;
        const ratio = Math.min(window.devicePixelRatio || 1, pixelRatioCap);
        const width = Math.floor(window.innerWidth * ratio);
        const height = Math.floor(window.innerHeight * ratio);
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
          webGpuContext.configure({ device, format, alphaMode: "opaque" });
        }
        const previousHdrView = hdrBokehView;
        createHdrTargets(width, height);
        if (!toneMapBindGroup || hdrBokehView !== previousHdrView) {
          toneMapBindGroup = device.createBindGroup({
            label: "webgpu tone map bind group",
            layout: toneMapBindGroupLayout,
            entries: [{ binding: 0, resource: hdrBokehView }]
          });
        }
      }

      function renderWebGpu(now) {
        if (document.visibilityState === "hidden") {
          requestAnimationFrame(renderWebGpu);
          return;
        }

        if (now - lastFrameTime < FRAME_INTERVAL_MS) {
          requestAnimationFrame(renderWebGpu);
          return;
        }
        lastFrameTime = now;
        resizeWebGpu();
        const width = canvas.width;
        const height = canvas.height;
        const minDim = Math.min(width, height);
        const time = now * 0.001;
        const activeLightsForFrame = activeLights();
        activeLightsForFrame.forEach((light, index) => writeInstanceData(instanceData, index * instanceStride, light, width, height, minDim, time));
        device.queue.writeBuffer(instanceBuffer, 0, instanceData);
        uploadShapeMaskTexture();

        const encoder = device.createCommandEncoder();
        const hdrPass = encoder.beginRenderPass({
          colorAttachments: [{
            view: hdrBokehView,
            clearValue: { r: 0, g: 0, b: 0, a: 0 },
            loadOp: "clear",
            storeOp: "store"
          }]
        });
        hdrPass.setPipeline(bokehPipeline);
        hdrPass.setBindGroup(0, shapeMaskBindGroup);
        hdrPass.setVertexBuffer(0, instanceBuffer);
        hdrPass.draw(6, activeLightsForFrame.length);
        hdrPass.end();

        const pass = encoder.beginRenderPass({
          colorAttachments: [{
            view: webGpuContext.getCurrentTexture().createView(),
            clearValue: { r: 0.006, g: 0.006, b: 0.009, a: 1 },
            loadOp: "clear",
            storeOp: "store"
          }]
        });
        pass.setPipeline(toneMapPipeline);
        pass.setBindGroup(0, toneMapBindGroup);
        pass.draw(3);
        pass.end();
        device.queue.submit([encoder.finish()]);
        renderReadout(canvas.width, canvas.height, activeLightsForFrame.length, "WebGPU HDR");
        requestAnimationFrame(renderWebGpu);
      }

      return {
        start() {
          resizeWebGpu();
          requestAnimationFrame(renderWebGpu);
        }
      };
    }

    async function startApp() {
      updateLabels();
      let canvasRenderer = createCanvasRenderer;
      try {
        const webGpuRenderer = await createWebGpuRenderer();
        webGpuRenderer.start();
      } catch (error) {
        console.warn("WebGPU renderer unavailable; using Canvas fallback.", error);
        canvasRenderer = createCanvasRenderer();
        canvasRenderer.start();
      }
    }

    startApp();
    window.addEventListener("resize", () => {
      lastFrameTime = 0;
    });
  </script>
</body>
</html>
